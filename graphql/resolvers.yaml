# AppSync Resolver Mapping Templates

# Query.product
productRequest: |
  {
    "version": "2017-02-28",
    "operation": "GetItem",
    "key": {
      "PK": $util.dynamodb.toDynamoDBJson("PRODUCT#${ctx.args.id}"),
      "SK": $util.dynamodb.toDynamoDBJson("METADATA")
    }
  }

productResponse: |
  #if($ctx.result)
    $util.toJson($ctx.result)
  #else
    null
  #end

# Query.products
productsRequest: |
  #set($filter = {})
  #if($ctx.args.filter.type)
    #set($filter.type = $ctx.args.filter.type)
  #end
  {
    "version": "2017-02-28",
    "operation": "Scan",
    "filter": {
      "expression": "SK = :sk",
      "expressionValues": {
        ":sk": $util.dynamodb.toDynamoDBJson("METADATA")
      }
    },
    "limit": 20,
    "nextToken": #if($ctx.args.nextToken) "$ctx.args.nextToken" #else null #end
  }

# Query.anomaly
anomalyRequest: |
  {
    "version": "2017-02-28",
    "operation": "Query",
    "query": {
      "expression": "PK = :pk",
      "expressionValues": {
        ":pk": $util.dynamodb.toDynamoDBJson("ANOMALY#*#${ctx.args.id}")
      }
    },
    "limit": 1
  }

# Query.anomalies
anomaliesRequest: |
  #set($indexName = "product-status-index")
  #set($keyCondition = "productId = :productId")
  #set($expressionValues = {})
  
  #if($ctx.args.filter.productId)
    $util.qr($expressionValues.put(":productId", $util.dynamodb.toDynamoDBJson($ctx.args.filter.productId)))
  #end
  
  #if($ctx.args.filter.status)
    #set($keyCondition = "${keyCondition} AND #status = :status")
