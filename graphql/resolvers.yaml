# Query.costTrend
costTrendRequest: |
  ## This would be a Lambda resolver
  {
    "version": "2017-02-28",
    "operation": "Invoke",
    "payload": {
      "field": "costTrend",
      "arguments": $util.toJson($ctx.args),
      "identity": $util.toJson($ctx.identity)
    }
  }

# Mutation.acknowledgeAnomaly
acknowledgeAnomalyRequest: |
  #set($now = $util.time.nowISO8601())
  {
    "version": "2017-02-28",
    "operation": "UpdateItem",
    "key": {
      "PK": $util.dynamodb.toDynamoDBJson("ANOMALY#*#${ctx.args.id}"),
      "SK": $util.dynamodb.toDynamoDBJson("METADATA")
    },
    "update": {
      "expression": "SET #status = :status, acknowledgedBy = :user, acknowledgedAt = :time, notes = :notes",
      "expressionNames": {
        "#status": "status"
      },
      "expressionValues": {
        ":status": $util.dynamodb.toDynamoDBJson("ACKNOWLEDGED"),
        ":user": $util.dynamodb.toDynamoDBJson($ctx.identity.username),
        ":time": $util.dynamodb.toDynamoDBJson($now),
        ":notes": $util.dynamodb.toDynamoDBJson($ctx.args.notes)
      }
    }
  }

# Mutation.resolveAnomaly
resolveAnomalyRequest: |
  #set($now = $util.time.nowISO8601())
  {
    "version": "2017-02-28",
    "operation": "UpdateItem",
    "key": {
      "PK": $util.dynamodb.toDynamoDBJson("ANOMALY#*#${ctx.args.id}"),
      "SK": $util.dynamodb.toDynamoDBJson("METADATA")
    },
    "update": {
      "expression": "SET #status = :status, resolution = :resolution, resolvedAt = :time",
      "expressionNames": {
        "#status": "status"
      },
      "expressionValues": {
        ":status": $util.dynamodb.toDynamoDBJson("RESOLVED"),
        ":resolution": $util.dynamodb.toDynamoDBJson($ctx.args.resolution),
        ":time": $util.dynamodb.toDynamoDBJson($now)
      }
    }
  }

# Subscription.onAnomalyDetected
onAnomalyDetectedRequest: |
  {
    "version": "2017-02-28",
    "payload": {
      "filterGroup": [
        {
          "filters": [
            {
              "fieldName": "productId",
              "operator": "eq",
              "value": #if($ctx.args.productId) "$ctx.args.productId" #else "*" #end
            },
            {
              "fieldName": "severity",
              "operator": "eq",
              "value": #if($ctx.args.severity) "$ctx.args.severity" #else "*" #end
            }
          ]
        }
      ]
    }
  }